<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <!-- background -->
  <rect x="0" y="0" width="960" height="560" fill="#ffffff"/>

  <text x="480" y="42" text-anchor="middle" font-size="24" font-weight="bold" fill="#1f2430">Bluetooth Joystick Controller — Wiring</text>
  <text x="480" y="66" text-anchor="middle" font-size="13" fill="#6b7280">Arduino Nano · HC-05/HC-06 Bluetooth · KY-023 joystick</text>

  <!-- ============ HC-05 module ============ -->
  <rect x="60" y="140" width="170" height="250" rx="10" fill="#eef4ff" stroke="#3b5bdb" stroke-width="2"/>
  <text x="145" y="168" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2430">HC-05 / HC-06</text>
  <text x="145" y="186" text-anchor="middle" font-size="11" fill="#6b7280">Bluetooth module</text>
  <!-- pins (right edge) -->
  <circle cx="230" cy="230" r="4" fill="#16a34a"/><text x="220" y="234" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">TXD</text>
  <circle cx="230" cy="180" r="4" fill="#2563eb"/><text x="220" y="184" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">RXD</text>
  <circle cx="230" cy="300" r="4" fill="#dc2626"/><text x="220" y="304" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">VCC</text>
  <circle cx="230" cy="350" r="4" fill="#333333"/><text x="220" y="354" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">GND</text>

  <!-- ============ Arduino Nano ============ -->
  <rect x="400" y="110" width="180" height="330" rx="10" fill="#eefbf3" stroke="#0f9d58" stroke-width="2"/>
  <text x="490" y="140" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2430">Arduino Nano</text>
  <text x="490" y="158" text-anchor="middle" font-size="11" fill="#6b7280">ATmega328P</text>
  <!-- left pins -->
  <circle cx="400" cy="180" r="4" fill="#2563eb"/><text x="410" y="184" font-size="13" font-weight="bold" fill="#1f2430">D1 / TX</text>
  <circle cx="400" cy="230" r="4" fill="#16a34a"/><text x="410" y="234" font-size="13" font-weight="bold" fill="#1f2430">D0 / RX</text>
  <circle cx="400" cy="300" r="4" fill="#dc2626"/><text x="410" y="304" font-size="13" font-weight="bold" fill="#1f2430">5V</text>
  <circle cx="400" cy="350" r="4" fill="#333333"/><text x="410" y="354" font-size="13" font-weight="bold" fill="#1f2430">GND</text>
  <!-- right pins -->
  <circle cx="580" cy="180" r="4" fill="#ea580c"/><text x="570" y="184" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">A0</text>
  <circle cx="580" cy="230" r="4" fill="#9333ea"/><text x="570" y="234" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">A1</text>
  <circle cx="580" cy="280" r="4" fill="#0d9488"/><text x="570" y="284" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">D2</text>
  <circle cx="580" cy="330" r="4" fill="#dc2626"/><text x="570" y="334" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">5V</text>
  <circle cx="580" cy="380" r="4" fill="#333333"/><text x="570" y="384" text-anchor="end" font-size="13" font-weight="bold" fill="#1f2430">GND</text>
  <!-- onboard LED note -->
  <text x="490" y="420" text-anchor="middle" font-size="11" fill="#6b7280">D13 LED flashes on each packet</text>

  <!-- ============ Joystick ============ -->
  <rect x="720" y="140" width="180" height="280" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="810" y="168" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2430">Joystick</text>
  <text x="810" y="186" text-anchor="middle" font-size="11" fill="#6b7280">KY-023 module</text>
  <!-- pins (left edge) -->
  <circle cx="720" cy="180" r="4" fill="#ea580c"/><text x="730" y="184" font-size="13" font-weight="bold" fill="#1f2430">VRx</text>
  <circle cx="720" cy="230" r="4" fill="#9333ea"/><text x="730" y="234" font-size="13" font-weight="bold" fill="#1f2430">VRy</text>
  <circle cx="720" cy="280" r="4" fill="#0d9488"/><text x="730" y="284" font-size="13" font-weight="bold" fill="#1f2430">SW</text>
  <circle cx="720" cy="330" r="4" fill="#dc2626"/><text x="730" y="334" font-size="13" font-weight="bold" fill="#1f2430">+5V</text>
  <circle cx="720" cy="380" r="4" fill="#333333"/><text x="730" y="384" font-size="13" font-weight="bold" fill="#1f2430">GND</text>

  <!-- ============ wires: HC-05 <-> Nano ============ -->
  <!-- BT TXD -> Nano RX (straight) -->
  <line x1="230" y1="230" x2="400" y2="230" stroke="#16a34a" stroke-width="2.5"/>
  <!-- Nano TX -> R1 -> node -> BT RXD (voltage divider) -->
  <line x1="400" y1="180" x2="390" y2="180" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="345" y="172" width="45" height="16" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="367" y="165" text-anchor="middle" font-size="11" fill="#2563eb">1 kΩ</text>
  <line x1="345" y1="180" x2="230" y2="180" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="310" cy="180" r="4" fill="#2563eb"/>
  <!-- R2 node -> GND -->
  <line x1="310" y1="180" x2="310" y2="245" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="302" y="245" width="16" height="45" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="330" y="272" font-size="11" fill="#2563eb">2 kΩ</text>
  <line x1="310" y1="290" x2="310" y2="350" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="310" cy="350" r="4" fill="#333333"/>
  <text x="255" y="130" font-size="11" fill="#6b7280">divider drops 5 V TX to ~3.3 V</text>
  <text x="255" y="115" font-size="11" fill="#6b7280">(skip if your module is 5 V-tolerant)</text>
  <!-- power -->
  <line x1="230" y1="300" x2="400" y2="300" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="230" y1="350" x2="400" y2="350" stroke="#333333" stroke-width="2.5"/>

  <!-- ============ wires: Nano <-> Joystick ============ -->
  <line x1="580" y1="180" x2="720" y2="180" stroke="#ea580c" stroke-width="2.5"/>
  <line x1="580" y1="230" x2="720" y2="230" stroke="#9333ea" stroke-width="2.5"/>
  <line x1="580" y1="280" x2="720" y2="280" stroke="#0d9488" stroke-width="2.5"/>
  <line x1="580" y1="330" x2="720" y2="330" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="580" y1="380" x2="720" y2="380" stroke="#333333" stroke-width="2.5"/>
  <text x="650" y="272" text-anchor="middle" font-size="11" fill="#6b7280">INPUT_PULLUP</text>

  <!-- ============ legend / notes ============ -->
  <rect x="60" y="470" width="840" height="60" rx="8" fill="#fef9e7" stroke="#d4a72c" stroke-width="1.5"/>
  <text x="80" y="495" font-size="13" font-weight="bold" fill="#7a5c00">⚠ Upload note</text>
  <text x="80" y="516" font-size="13" fill="#5c4a00">The HC-05 shares the Nano's hardware serial pins (D0/D1) — disconnect it while uploading the sketch, then reconnect.</text>
</svg>
